name: recruiting-jd-to-shortlist
trigger: 用户提交 JD 与候选人简历
inputs:
  - jd_text
  - candidate_resume
  - optional_notes
retrieve:
  - verticals/recruiting
  - knowledge/base
  - templates/prompts
  - templates/reports
steps:
  - jd_decompose
  - extract_candidate_profile
  - compare_fit
  - identify_risks
  - draft_recommendation_report
  - human_review
  - capture_human_feedback
  - persist_feedback_record
outputs:
  - jd_summary
  - fit_assessment
  - recommendation_report
  - feedback_record
human_review: true
feedback_capture: true
feedback_stage: recommendation_report
feedback_store:
  - feedback/reviews/ai-application-engineer/feedback-loop-sample.md
